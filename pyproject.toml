[project]
name = "autocustomizeresume"
version = "0.1.0"
description = "Auto-customize your LaTeX resume for different jobs using LLM-powered content selection"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.13"
authors = [{ name = "Avish Jha", email = "avish.j@pm.me" }]
keywords = ["resume", "latex", "llm", "cli", "cover-letter", "job-application"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    "openai>=2.24.0",
    "pypdf>=6.7.4",
    "python-dotenv>=1.2.1",
    "pyyaml>=6.0.3",
    "watchdog>=6.0.0",
]

[project.urls]
Homepage = "https://github.com/avishj/AutoCustomizeResume"
Repository = "https://github.com/avishj/AutoCustomizeResume"
Changelog = "https://github.com/avishj/AutoCustomizeResume/blob/main/CHANGELOG.md"
Issues = "https://github.com/avishj/AutoCustomizeResume/issues"

[project.scripts]
autocustomizeresume = "autocustomizeresume.cli:main"

[tool.uv]
python-preference = "managed"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["autocustomizeresume"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.4",
    "ty>=0.0.20",
]

[tool.coverage.run]
source = ["autocustomizeresume"]
branch = true

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 80

[tool.pytest.ini_options]
addopts = "--cov --cov-report=term-missing"

[project]
name = "autocustomizeresume"
version = "0.1.0"
description = "Auto-customize your LaTeX resume for different jobs using LLM-powered content selection"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "openai>=2.24.0",
    "pypdf>=6.7.4",
    "python-dotenv>=1.2.1",
    "pyyaml>=6.0.3",
    "watchdog>=6.0.0",
]

[project.scripts]
autocustomizeresume = "autocustomizeresume.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["autocustomizeresume"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.4",
]

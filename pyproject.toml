[project]
name = "autocustomizeresume"
version = "0.1.0"
description = "Auto-customize your LaTeX resume for different jobs using LLM-powered content selection"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "openai>=1.3.0",
    "watchdog>=4.0.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["autocustomizeresume"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

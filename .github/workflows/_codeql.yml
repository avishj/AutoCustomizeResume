---
name: CodeQL

on:
  workflow_call:

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          setup-python-dependencies: false
          config: |
            paths-ignore:
              - "docs/**"
              - "**/*_test.py"
              - "**/test_*.py"
              - "tests/**"
            threat-models:
              - remote-sources
              - local-sources
              - environment-sources

      - name: Perform analysis
        uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          category: /language:${{ matrix.language }}
          output: codeql-results
          upload: always
